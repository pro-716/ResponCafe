<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESPAWN | المنيو الرقمي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #0b0c10; color: white; }
        .glass { background: rgba(31, 40, 51, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(102, 252, 241, 0.2); }
    </style>
</head>
<body class="p-4 pb-32">
    <header class="text-center my-8">
        <h1 class="text-4xl font-black text-[#66fcf1]">RESPAWN</h1>
        <p class="text-gray-400">أهلاً بك، اختر طلباتك من المنيو</p>
    </header>

    <div id="menu-grid" class="grid grid-cols-2 gap-4 max-w-md mx-auto">
        <!-- المنتجات تظهر هنا من Firebase -->
    </div>

    <div class="fixed bottom-0 left-0 right-0 p-4 glass rounded-t-3xl">
        <div class="max-w-md mx-auto">
            <div id="cart-view" class="text-sm mb-3 max-h-32 overflow-y-auto text-gray-300">السلة فارغة...</div>
            <select id="table-select" class="w-full bg-black p-3 rounded-xl mb-3 text-white border border-gray-700">
                <option value="">🎯 اختر رقم طاولتك</option>
                <option value="7">طاولة 7</option><option value="8">طاولة 8</option>
                <option value="9">طاولة 9</option><option value="10">طاولة 10</option>
                <option value="PS1">PS 1</option><option value="PS2">PS 2</option>
                <option value="PS3">PS 3</option><option value="PS4">PS 4</option>
                <option value="PS5">PS 5</option><option value="PS6">PS 6</option>
                <option value="11">منضدة 11</option><option value="12">منضدة 12</option>
            </select>
            <button id="send-btn" class="w-full bg-[#66fcf1] text-black font-bold py-3 rounded-xl active:scale-95 transition-all">إرسال الطلب للكابتن ⚡</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";
        import { firebaseConfig, BOT_TOKEN, CHAT_ID } from "./config.js";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let cart = [];

        async function loadMenu() {
            const snap = await getDocs(collection(db, "products"));
            const grid = document.getElementById('menu-grid');
            snap.forEach(doc => {
                const p = doc.data();
                grid.innerHTML += `
                    <div onclick="addToCart('${doc.id}', '${p.name}', ${p.price})" class="glass p-4 rounded-2xl text-center cursor-pointer active:bg-[#66fcf1] active:text-black transition-all">
                        <div class="font-bold text-sm">${p.name}</div>
                        <div class="text-[#66fcf1] text-xs">${p.price} د.ع</div>
                    </div>
                `;
            });
        }

        window.addToCart = (id, name, price) => {
            cart.push({id, name, price});
            document.getElementById('cart-view').innerHTML = cart.map(i => `<div>• ${i.name} (${i.price})</div>`).join('');
        }

        document.getElementById('send-btn').onclick = async () => {
            const table = document.getElementById('table-select').value;
            if(!table || cart.length === 0) return alert("اختر الطاولة والمنتجات!");

            const orderData = { table, items: cart, status: 'pending', time: new Date().toLocaleTimeString() };
            await addDoc(collection(db, "orders"), orderData);

            const msg = `🔔 *طلب جديد من الزبون*\n📍 الطاولة: ${table}\n📦 الطلبات: ${cart.map(i => i.name).join(', ')}\n⚠️ الحالة: قيد الانتظار`;
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({chat_id: CHAT_ID, text: msg, parse_mode: 'Markdown'})
            });

            alert("تم إرسال طلبك! انتظر الكابتن ✅");
            cart = [];
            location.reload();
        }
        loadMenu();
    </script>
</body>
</html>
