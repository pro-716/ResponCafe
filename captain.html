<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الكابتن | RESPAWN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #0b0c10; color: white; }
        .glass { background: rgba(31, 40, 51, 0.8); border: 1px solid rgba(102, 252, 241, 0.2); }
    </style>
</head>
<body class="p-4 pb-32">
    <h2 class="text-2xl font-black text-[#66fcf1] mb-6">👨‍🍳 لوحة الكابتن</h2>

    <!-- قسم الطلبات المنتظرة -->
    <div class="mb-8">
        <h3 class="text-sm font-bold mb-3 text-yellow-400">⏳ طلبات الزبائن (قيد الانتظار)</h3>
        <div id="pending-orders" class="space-y-3"></div>
    </div>

    <!-- قسم الطلب اليدوي (للكابتن) -->
    <div class="glass p-4 rounded-3xl mb-8">
        <h3 class="text-sm font-bold mb-3 text-[#66fcf1]">➕ طلب يدوي سريع (للكابتن)</h3>
        <div class="grid grid-cols-2 gap-2 mb-4" id="captain-menu"></div>
        <select id="cap-table" class="w-full bg-black p-2 rounded mb-2 text-xs border border-gray-700">
            <option value="">🎯 اختر الطاولة</option>
            <option value="7">طاولة 7</option><option value="8">طاولة 8</option>
            <option value="PS1">PS 1</option><option value="11">منضدة 11</option>
        </select>
        <button id="cap-send" class="w-full bg-purple-600 py-2 rounded-xl text-sm font-bold">إضافة للحساب فوراً ⚡</button>
    </div>

    <!-- إدارة الأسعار -->
    <div class="glass p-4 rounded-3xl opacity-70">
        <h3 class="text-sm font-bold mb-3 text-gray-400">⚙️ تعديل الأسعار والمنتجات</h3>
        <div class="flex gap-2 mb-4">
            <input id="p-name" placeholder="الاسم" class="bg-black p-2 rounded text-xs w-1/2">
            <input id="p-price" type="number" placeholder="السعر" class="bg-black p-2 rounded text-xs w-1/4">
            <button id="p-add" class="bg-green-600 px-3 rounded text-xs">إضافة</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, updateDoc, doc, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";
        import { firebaseConfig, BOT_TOKEN, CHAT_ID } from "./config.js";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let capCart = [];

        // جلب الطلبات المنتظرة لحظياً
        onSnapshot(query(collection(db, "orders"), where("status", "==", "pending")), (snap) => {
            const div = document.getElementById('pending-orders');
            div.innerHTML = '';
            snap.forEach(orderDoc => {
                const data = orderDoc.data();
                div.innerHTML += `
                    <div class="glass p-3 rounded-xl flex justify-between items-center">
                        <div>
                            <div class="font-bold text-xs">طاولة ${data.table}</div>
                            <div class="text-[10px] text-gray-400">${data.items.map(i => i.name).join(', ')}</div>
                        </div>
                        <button onclick="confirmOrder('${orderDoc.id}', '${data.table}', ${JSON.stringify(data.items).replace(/"/g, '&quot;')})" class="bg-green-600 px-3 py-1 rounded-lg text-xs">تأكيد ✅</button>
                    </div>
                `;
            });
        });

        window.confirmOrder = async (id, table, items) => {
            // 1. تحديث حالة الطلب إلى مؤكد
            await updateDoc(doc(db, "orders", id), { status: 'confirmed' });
            
            // 2. إضافة المبلغ لحساب الطاولة (ببساطة هنا نرسل تليجرام، وفي الكاشير يتم الجمع)
            const total = items.reduce((sum, i) => sum + i.price, 0);
            const msg = `✅ *تأكيد توصيل*\n📍 طاولة: ${table}\n💰 المبلغ المضاف: ${total} د.ع`;
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({chat_id: CHAT_ID, text: msg, parse_mode: 'Markdown'})
            });
            alert("تم التأكيد والإضافة للحساب!");
        }

        // نظام الطلب اليدوي للكابتن
        async function loadCapMenu() {
            const snap = await getDocs(collection(db, "products"));
            const grid = document.getElementById('captain-menu');
            snap.forEach(d => {
                const p = d.data();
                grid.innerHTML += `<div onclick="addToCapCart('${p.name}', ${p.price})" class="bg-black p-2 rounded-lg text-[10px] cursor-pointer border border-gray-800">${p.name} (${p.price})</div>`;
            });
        }

        window.addToCapCart = (name, price) => {
            capCart.push({name, price});
            alert(`تم إضافة ${name} للسلة`);
        }

        document.getElementById('cap-send').onclick = async () => {
            const table = document.getElementById('cap-table').value;
            if(!table || capCart.length === 0) return alert("حدد الطاولة والطلبات!");
            
            await addDoc(collection(db, "orders"), { table, items: capCart, status: 'confirmed', time: new Date().toLocaleTimeString(), manual: true });
            
            const msg = `👨‍🍳 *طلب يدوي من الكابتن*\n📍 طاولة: ${table}\n📦 الأصناف: ${capCart.map(i => i.name).join(', ')}\n✅ الحالة: مؤكد فوراً`;
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({chat_id: CHAT_ID, text: msg, parse_mode: 'Markdown'})
            });
            capCart = [];
            alert("تم الإضافة للحساب بنجاح!");
        }

        // إدارة المنتجات
        document.getElementById('p-add').onclick = async () => {
            const name = document.getElementById('p-name').value;
            const price = parseInt(document.getElementById('p-price').value);
            if(!name || !price) return;
            await addDoc(collection(db, "products"), { name, price });
            alert("تم إضافة المنتج!");
        }

        loadCapMenu();
    </script>
</body>
</html>
